services:
  mongodb:
    image: mongo:latest
    container_name: artha_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongo', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: artha_qdrant
    ports:
      - '6333:6333' # REST API
      - '6334:6334' # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:6333/health/status']
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: artha_fastapi
    ports:
      - '8000:8000'
    depends_on:
      - mongodb
      - qdrant
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - QDRANT_URL=http://qdrant:6333
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build: ./frontend
    container_name: artha_streamlit
    ports:
      - '8501:8501'
    depends_on:
      - fastapi
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:8501']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  qdrant_data:
